<button
  type="button"
  class="cv-download"
  [attr.aria-label]="'CV.DOWNLOAD_ARIA' | translate"
  (click)="onDownload()"
>
  <svg
    class="cv-download__icon"
    viewBox="0 0 24 24"
    width="18"
    height="18"
    aria-hidden="true"
    focusable="false"
  >
    <path
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"
    />
  </svg>
  <span class="cv-download__label">{{ 'CV.DOWNLOAD' | translate }}</span>
</button>
